<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JFV-首页</title>
    <style>
        body{
            margin:0;
            height:100vh;
            background-color:#eee;
        }
        /**{
            border:1px solid black;
        }*/
        .flex{
            display:flex;
        }
        .white{
            background-color: white;
            box-shadow:rgb(0 0 0 / 20%) 0px 2px 1px -1px,
              rgb(0 0 0 / 14%) 0px 1px 1px 0px, rgb(0 0 0 / 12%) 0px 1px 3px 0px;
        }
        .flex1{
            flex:1;
        }
        .column{
            flex-direction: column;
        }
        .mg8{
            margin:8px;
        }
        .mgt8{
            margin-top:8px;
        }
        .mgr8{
            margin-right:8px;
        }
    </style>
</head>
<body class="flex">
    <!-- 侧边栏 -->
    <div style="width: 250px; z-index:2;" class="white"></div>
    <!-- 主区域 -->
    <div class="flex1 flex column">
        <!-- 头部栏 -->
        <div style="height:110px; z-index:1;" class="white"></div>
        <!-- 内容区 -->
        <div style="overflow: auto;" class="flex1 flex">
            <!--左区-->
            <div style="flex:3;" class="flex column mg8">
                <!-- 数据区-->
                <div class="flex">
                    <!-- 数据块 -->
                    <div style="height: 150px;" class="flex1 white mg8"></div>
                    <div style="height: 150px;" class="flex1 white mg8"></div>
                    <div style="height: 150px;" class="flex1 white mg8"></div>
                    <div style="height: 150px;" class="flex1 white mg8"></div>
                </div>
                <!-- 列表区-->
                <div class="flex column">
                    <!-- 列表项 -->
                    <p>——最新消息——</p>
                    <div style="height:150px" class="white mg8"></div>
                    <div style="height:150px;" class="white mg8"></div>
                    <p>——最近热点——</p>
                    <div style="height:150px" class="white mg8"></div>
                    <div style="height:150px;" class="white mg8"></div>
                    <div style="height:150px;" class="white mg8"></div>
                </div>
            </div>
            <!--右区-->
            <div style="flex:1;"class="flex column mgr8 mgt8">
                <!-- 提示区-->
                <div style="height: 200px;" class="white"></div>
                <!-- 消息区-->
                <div style="height: 450px;" class="white mgt8"></div>
            </div>
        </div>
    </div>
</body>
</html>
